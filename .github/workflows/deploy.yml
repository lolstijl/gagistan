name: Deploy Vite to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# This allows only one concurrent deployment, skipping intermediate runs for better efficiency
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Updated from v4

      - name: Setup Node
        uses: actions/setup-node@v6 # Updated from v4
        with:
          node-version: 24 # Use the current LTS version
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4 # Updated from v3
        with:
          path: 'dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # Updated from v4